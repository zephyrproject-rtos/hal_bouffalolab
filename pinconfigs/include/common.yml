# Common elements of all Pinctrls

peripherals:
  - [sf, 2, 1, 2, 3]
  - [uart, 7, 0]
  - [adc, 10]
  - [analog, 10]
  - [swgpio, 11]
  - [gpio, 11]

signals:
# UART signals are fully swappable
  - [rts, 0]
  - [cts, 1]
  - [tx, 2]
  - [rx, 3]
# Flash signals have some swaps
  - [cs, 0]
  - [d0, 1]
  - [d1, 2]
  - [d2, 3]
  - [d3, 4]
  - [clk, 5]
