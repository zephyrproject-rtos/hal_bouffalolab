#
# Sources:
# - BL702L_704L_DS_en_1.1.pdf
# - bl70x.yml (for format reference)
#
# Pin codes:
#
# - BL702L 32-pin QFN (22 GPIOs)
# - BL704L 40-pin QFN (29 GPIOs)
#
# Key differences from BL70x:
# - Only one UART (UART0) with 4 signal routing slots
# - No I2S peripheral
# - No camera (CAM) interface
# - PDM interface available on some pins
# - Different ADC channel mappings
# - 2 PWM peripherals: PWM0 (1 SC channel), PWM1 (4 MC channels)

model: bflb,bl

family: bl70xl

map: BFLB_PINMUX

series: [702l, 704l]

peripherals:
    - [flash, 2, 0, 1, 2]
    - [spi, 4]
    - [pdm, 5]
    - [i2c, 6]
    - [uart, 7, 0]
    - [pwm, 8, 0, 1]
    - [analog, 10]
    - [adc, 10]
    - [swgpio, 11]
    - [gpio, 11]
    - [jtag, 14]
#   - [kscan_in, 21]
#   - [kscan_drive, 22]

signals:
    - [rts, 0]
    - [cts, 1]
    - [tx, 2]
    - [rx, 3]

pins:
    gpio0:
        series: [702l, 704l]
        periph:
            - [spi, [mosi]]
            - [pdm, [clk]]
            - [i2c, [scl]]
            - [uart0, [rts, cts, tx, rx]]
            - [pwm0, [ch0]]
            - [jtag, [tms]]

    gpio1:
        series: [702l, 704l]
        periph:
            - [spi, [miso]]
            - [pdm, [in0]]
            - [i2c, [sda]]
            - [uart0, [rts, cts, tx, rx]]
            - [pwm1, [ch0]]
            - [jtag, [tdi]]

